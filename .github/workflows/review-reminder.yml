name: Review reminder (cada 15 días)

on:
  schedule:
    # Día 1 y 16 de cada mes a las 09:00 UTC (= 11:00 Madrid verano / 10:00 invierno)
    - cron: '0 9 1,16 * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-review-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create review checklist issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().slice(0, 10);
            const template = fs.readFileSync('.github/REVIEW_TEMPLATE.md', 'utf8');
            const body = template.replace(/\{\{TODAY\}\}/g, today);
            const title = `📋 Revisión quincenal del dashboard — ${today}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['review', 'manual-data']
            });
            console.log(`✓ Issue creada: ${title}`);
